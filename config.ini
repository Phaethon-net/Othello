; Othello configuration

[site]
title   = "Othello"
version = "20260406A"
favicon = "favicon.ico"

[viewer]
; default viewer for new sessions: spotlight | pview
default = "pview"

; Per-server overrides. Section name format: paths.<SERVER_NAME>
; Use forward slashes on Windows.

[paths.localhost]
data_fs  = "D:/clarus_data/"
data_url = "/Clarus_Data/"
base_url = "/Othello/"

[paths.eyeclinic]
data_fs  = "D:/clarus_data/"
data_url = "/Clarus_data/"
base_url = "/Othello/"
